<?xml version="1.0" encoding="UTF-8"?>
<!-- Kung Fu Soccer · Main menu background · 1136x640 · stadium night, pitch level, layered depth -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1136 640" width="1136" height="640">
  <defs>
    <!-- Sky: dark blue gradient (specified exception) -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="60%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <!-- Stadium light glow -->
    <radialGradient id="midfieldGlow" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#e9c46a" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0"/>
    </radialGradient>
    <!-- Title area glow -->
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Sky (dark blue gradient) -->
  <rect width="1136" height="640" fill="url(#sky)"/>

  <!-- Layer 2: Far stadium bleachers (silhouettes) -->
  <g fill="#0a0e1a" stroke="none">
    <!-- Left stands -->
    <path d="M0 280 Q0 200 80 180 L200 160 L200 640 L0 640 Z"/>
    <!-- Right stands -->
    <path d="M1136 280 Q1136 200 1056 180 L936 160 L936 640 L1136 640 Z"/>
    <!-- Back center bleachers -->
    <rect x="368" y="120" width="400" height="140" rx="4"/>
    <rect x="388" y="100" width="360" height="30" rx="2"/>
  </g>

  <!-- Layer 3: Midfield lights (glowing band) -->
  <rect x="0" y="320" width="1136" height="200" fill="url(#midfieldGlow)"/>
  <!-- Light pillars left -->
  <rect x="120" y="200" width="12" height="180" fill="#1a2744" stroke="#000" stroke-width="2"/>
  <rect x="140" y="180" width="8" height="200" fill="#1a2744" stroke="#000" stroke-width="2"/>
  <!-- Light pillars right -->
  <rect x="1004" y="200" width="12" height="180" fill="#1a2744" stroke="#000" stroke-width="2"/>
  <rect x="988" y="180" width="8" height="200" fill="#1a2744" stroke="#000" stroke-width="2"/>
  <!-- Lamp glow dots -->
  <circle cx="126" cy="210" r="14" fill="#e9c46a" opacity="0.9" filter="url(#softGlow)"/>
  <circle cx="1018" cy="210" r="14" fill="#e9c46a" opacity="0.9" filter="url(#softGlow)"/>

  <!-- Layer 4: Near pitch (green foreground) -->
  <path d="M0 420 Q0 380 100 360 L1036 360 Q1136 380 1136 420 L1136 640 L0 640 Z" fill="#2d8a4e" stroke="#000" stroke-width="2.5"/>
  <!-- Pitch line (center) -->
  <ellipse cx="568" cy="520" rx="220" ry="60" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>

  <!-- Layer 5: Kung fu fighter silhouettes on sidelines -->
  <g fill="#000" stroke="none">
    <!-- Left sideline: two fighters -->
    <path d="M180 480 L175 520 L185 518 L190 478 Z"/><!-- torso -->
    <path d="M172 518 L168 560 L178 558 L182 518 Z"/><!-- leg -->
    <path d="M188 518 L192 558 L202 556 L198 516 Z"/><!-- leg -->
    <path d="M178 472 L168 478 L172 488 L182 482 Z"/><!-- arm -->
    <path d="M192 468 L200 472 L198 482 L188 478 Z"/><!-- arm raised -->
    <circle cx="185" cy="458" r="14"/><!-- head -->
    <!-- Second fighter left -->
    <path d="M240 490 L235 530 L248 528 L252 488 Z"/>
    <path d="M232 528 L228 568 L238 566 L242 526 Z"/>
    <path d="M252 528 L256 568 L266 566 L262 526 Z"/>
    <path d="M238 482 L228 488 L232 498 L242 492 Z"/>
    <circle cx="245" cy="468" r="12"/>
    <!-- Right sideline: two fighters -->
    <path d="M956 488 L951 528 L961 526 L966 486 Z"/>
    <path d="M948 526 L944 566 L954 564 L958 524 Z"/>
    <path d="M964 526 L968 566 L978 564 L974 524 Z"/>
    <path d="M958 478 L948 484 L952 494 L962 488 Z"/><!-- arm kick -->
    <circle cx="961" cy="466" r="14"/>
    <path d="M896 492 L891 532 L904 530 L908 490 Z"/>
    <path d="M888 530 L884 570 L894 568 L898 528 Z"/>
    <path d="M908 530 L912 570 L922 568 L918 528 Z"/>
    <circle cx="902" cy="470" r="12"/>
  </g>

  <!-- Layer 6: Glowing title area (center-top) -->
  <g filter="url(#titleGlow)">
    <rect x="268" y="48" width="600" height="88" rx="12" fill="#16213e" fill-opacity="0.92" stroke="#ffd700" stroke-width="2.5" stroke-opacity="0.8"/>
    <text x="568" y="98" text-anchor="middle" fill="#ffd700" font-size="42" font-weight="bold" font-family="Arial, sans-serif">ź+ł</text>
    <text x="568" y="122" text-anchor="middle" fill="#e9c46a" font-size="16" font-family="Arial, sans-serif">Kung Fu Soccer</text>
  </g>

  <!-- Layer 7: Three button slots (center-bottom) -->
  <g stroke="#000" stroke-width="2.5">
    <rect x="368" y="488" width="400" height="52" rx="10" fill="#16213e" fill-opacity="0.85"/>
    <rect x="388" y="504" width="360" height="44" rx="8" fill="none" stroke="#e9c46a" stroke-opacity="0.6" stroke-dasharray="8 4"/>
    <!-- Slot dividers -->
    <line x1="488" y1="508" x2="488" y2="544" stroke="#2a9d8f" stroke-opacity="0.5"/>
    <line x1="648" y1="508" x2="648" y2="544" stroke="#2a9d8f" stroke-opacity="0.5"/>
  </g>

  <!-- Layer 8: Particles / confetti -->
  <g fill="none" stroke-width="0">
    <circle cx="120" cy="140" r="4" fill="#e63946" opacity="0.85"/>
    <circle cx="280" cy="220" r="3" fill="#ffd700" opacity="0.9"/>
    <circle cx="920" cy="180" r="5" fill="#2a9d8f" opacity="0.8"/>
    <circle cx="760" cy="260" r="3" fill="#e9c46a" opacity="0.85"/>
    <rect x="400" y="160" width="6" height="6" fill="#e63946" opacity="0.7" transform="rotate(20 403 163)"/>
    <rect x="650" y="200" width="5" height="5" fill="#ffd700" opacity="0.8" transform="rotate(-15 652 202)"/>
    <circle cx="180" cy="320" r="3" fill="#2d8a4e" opacity="0.75"/>
    <circle cx="980" cy="300" r="4" fill="#e9c46a" opacity="0.8"/>
    <circle cx="568" cy="380" r="3" fill="#ffd700" opacity="0.7"/>
    <rect x="320" y="280" width="4" height="4" fill="#2a9d8f" opacity="0.8" transform="rotate(45 322 282)"/>
    <rect x="800" y="340" width="5" height="5" fill="#e63946" opacity="0.65" transform="rotate(-30 802 342)"/>
  </g>
</svg>
